# Race Control Plugin – AssettoServer
# Admin-verktøy: safety car, rødt flagg, restart, kick/ban
# Aktiveres i extra_cfg.yml på Formula og Roadcar

# ═══════════════════════════════════════════════════════════════
# Legg til i formula/extra/extra_cfg.yml og roadcar/extra/extra_cfg.yml
# ═══════════════════════════════════════════════════════════════

RaceControlPlugin:
  Enabled: true

  # Safety Car
  SafetyCarEnabled: true
  SafetyCarCarId: 0                  # Første bil i entry list = safety car
  SafetyCarMinSpeed: 60              # km/t – biler bak må holde denne
  SafetyCarMaxSpeed: 80

  # Rødt flagg
  RedFlagEnabled: true
  RedFlagMinLap: 1                   # Rødt flagg ikke mulig på første runde

  # Auto-restart etter rødt flagg
  AutoRestartAfterRedFlag: false     # Manuell restart via admin

  # Virtual Safety Car (VSC)
  VirtualSafetyCarEnabled: true
  VscMaxSpeed: 100                   # km/t – maks fart under VSC

  # Admin-kommandoer (skriv i chat med admin-passord)
  # /racecontrol sc          – deploy safety car
  # /racecontrol vsc         – deploy virtual safety car
  # /racecontrol redflag     – rødt flagg
  # /racecontrol restart     – restart sesjonen
  # /racecontrol clear       – fjern safety car / VSC

  # Notifikasjoner til spillere
  NotifyPlayersOnSafetyCar: true
  NotifyPlayersOnRedFlag: true
  SafetyCarMessage: "⚠️ SAFETY CAR DEPLOYED – Reduce speed!"
  RedFlagMessage: "🚩 RED FLAG – Return to pits immediately!"
  VscMessage: "⚠️ VIRTUAL SAFETY CAR – Max {speed} km/h!"


# ═══════════════════════════════════════════════════════════════
# NB: Race Control er IKKE aktivert på Trackday (Nordschleife)
# TF-serveren kjører fri kjøring uten race-kontroll
# ═══════════════════════════════════════════════════════════════


# ═══════════════════════════════════════════════════════════════
# ADMIN TILGANG
# Sett ADMIN_PASSWORD i server_cfg.ini
# Logg inn via Content Manager → Server → Admin Panel
# Eller skriv passord direkte i chat for å få admin-rettigheter
# ═══════════════════════════════════════════════════════════════
