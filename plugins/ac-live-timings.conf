# AC Live Timings – Live kartvisning i nettleser
# Nås via live.dittdomene.no (Caddy proxyer port 8772)
# GitHub: https://github.com/nitrocrime/ac-live-timings

# ═══════════════════════════════════════════════════════════════
# /opt/ac-live-timings/config.json
# ═══════════════════════════════════════════════════════════════
{
  "servers": [
    {
      "name": "🏔️ Trackday – Nordschleife",
      "host": "127.0.0.1",
      "port": 9600,
      "httpPort": 9680,
      "password": "",
      "adminPassword": "CHANGE_ME",
      "color": "#2ecc71"
    },
    {
      "name": "🏁 MX-5 Cup 2026",
      "host": "127.0.0.1",
      "port": 9610,
      "httpPort": 9690,
      "password": "",
      "adminPassword": "CHANGE_ME",
      "color": "#e74c3c"
    },
    {
      "name": "🏎️ GT3 Series 2026",
      "host": "127.0.0.1",
      "port": 9620,
      "httpPort": 9700,
      "password": "",
      "adminPassword": "CHANGE_ME",
      "color": "#3498db"
    }
  ],

  "web": {
    "port": 8772,
    "bind": "127.0.0.1",
    "title": "AC Live Timings",
    "refreshInterval": 2000
  },

  "features": {
    "showTrackMap": true,
    "showGaps": true,
    "showBestLap": true,
    "showSectors": true,
    "showWeather": true,
    "showAiCars": false
  }
}


# ═══════════════════════════════════════════════════════════════
# SYSTEMD SERVICE – /etc/systemd/system/ac-live-timings.service
# ═══════════════════════════════════════════════════════════════
[Unit]
Description=AC Live Timings
After=ac-trackday.service ac-mx5cup.service ac-gt3.service

[Service]
Type=simple
User=acserver
WorkingDirectory=/opt/ac-live-timings
ExecStart=/usr/bin/node /opt/ac-live-timings/server.js
Restart=always
RestartSec=5
SyslogIdentifier=ac-live-timings

[Install]
WantedBy=multi-user.target


# ═══════════════════════════════════════════════════════════════
# INSTALLASJON
# cd /opt && git clone https://github.com/nitrocrime/ac-live-timings
# cd ac-live-timings && npm install
# cp config.json /opt/ac-live-timings/config.json
# systemctl enable --now ac-live-timings
