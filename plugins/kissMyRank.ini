# KissMyRank – In-game live rangering
# Krever stracker som backend
# Plasser kissMyRank.ini i hver servers mappe

# ═══════════════════════════════════════════════════════════════
# TRACKDAY – /opt/ac-trackday/kissMyRank.ini
# ═══════════════════════════════════════════════════════════════
[GENERAL]
# Kobler til stracker for live data
stracker_host = 127.0.0.1
stracker_port = 50041

# Visning in-game
display_mode = RELATIVE              # RELATIVE = vis biler rundt deg
                                     # ABSOLUTE = vis alle på lista
positions_above = 3                  # Vis 3 plasser over deg
positions_below = 3                  # Vis 3 plasser under deg
show_gap = True                      # Vis tidsgap
show_best_lap = True                 # Vis beste rundetid

# For Nordschleife TF – fri kjøring, vis rundetider
session_type = PRACTICE
gap_format = LAP_TIME                # Vis gap som rundetider, ikke sekunder

[STYLE]
font_size = 14
opacity = 0.85
position_x = 20                      # Plassering på skjermen (prosent)
position_y = 35


# ═══════════════════════════════════════════════════════════════
# FORMULA – /opt/ac-formula/kissMyRank.ini
# ═══════════════════════════════════════════════════════════════
[GENERAL]
stracker_host = 127.0.0.1
stracker_port = 50042

display_mode = RELATIVE
positions_above = 3
positions_below = 3
show_gap = True
show_best_lap = True

# For racing – vis gap i sekunder
session_type = RACE
gap_format = SECONDS

[STYLE]
font_size = 14
opacity = 0.85
position_x = 20
position_y = 35


