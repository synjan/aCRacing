# AssettoServer – Formula Serie Extra Config

# ── AI GRID FILLER ────────────────────────────────────────────
AiParams:
  Enabled: true
  MaxAiTargetCount: 16
  Behavior: RacingMode         # Full racing-modus
  AiSkillLevel: 90             # 0-100, høyere for mer utfordring
  AiAggression: 55             # Litt mer aggressiv i dueller
  HideAiBeyondDistanceM: 500

PlayerAiSlots:
  Enabled: true
  MinPlayerCount: 5

# ── CHECKSUMS ─────────────────────────────────────────────────
# Kunos-bil – alle har den, checksums ikke nødvendig
ChecksumEnabled: false

# ── REAL PENALTY (track limits) ───────────────────────────────
RealPenaltyPlugin:
  Enabled: true
  TrackLimitsEnabled: true
  PenaltyMode: DriveThrough    # Drive-through straff
  AllowedWheelsOffTrack: 2     # Maks 2 hjul utenfor
  IncidentRating: true
  CutPenaltyThresholdMs: 200   # Kutt >0.2s gir straff

# ── SOL VÆR ──────────────────────────────────────────────────
WeatherFxPlugin:
  Enabled: true
  StartTime: 17:00             # Golden hour – kveldssol
  StartWeatherType: 1          # Overveiende klart
  TimeMultiplier: 1
  SyncWeatherWithClients: true
  RainChance: 0.15             # Lav sjanse for regn

# ── CSP FEATURES ──────────────────────────────────────────────
DynamicTrackSurface: true
RubberFxEnabled: true          # Gummi bygges opp gjennom sesjonen
ExtraHudEnabled: true

# ── RACE CONTROL ──────────────────────────────────────────────
RaceControlPlugin:
  Enabled: true
  SafetyCarEnabled: true
  VirtualSafetyCarEnabled: true
  VscMaxSpeed: 100
  RedFlagEnabled: true
  AutoRestartAfterRedFlag: false
  NotifyPlayersOnSafetyCar: true
  NotifyPlayersOnRedFlag: true
  SafetyCarMessage: "⚠️ SAFETY CAR – Reduce speed!"
  RedFlagMessage: "🚩 RED FLAG – Return to pits!"

# ── STRACKER ──────────────────────────────────────────────────
EnableStracker: true
StrackerPort: 50042
