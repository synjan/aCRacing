[STRACKER_CONFIG]
# stracker konfig – Formula Serie
# Plasser i /opt/stracker/formula/stracker.ini

[STRACKER]
ac_server_cfg_ini = /opt/ac-formula/cfg/server_cfg.ini
listening_port = 50042
perform_checksum_check = False

database_file = /opt/stracker/formula/stracker.db3
database_type = sqlite3

log_file = /opt/stracker/formula/stracker.log
log_level = info

[HTTP_CONFIG]
enabled = True
port = 50042
bind_address = 127.0.0.1
ssl = False

banner = Formula Series 2026 Stats
item_count = 25

[LAPSTATS_CONFIG]
ignore_pits = True
min_num_laps_in_stats = 1
max_lap_invalid_cut = 2              # Strengere for Formula – 2 kutt maks

# Kun gyldige race-runder i topp-lista
valid_only = True

[WELCOME_MSG]
line1 = Velkommen til Formula Series 2026!
line2 = Bil: Formula Abarth | Banen roterer daglig kl. 06:00
line3 = Statistikk: stats.dittdomene.no/formula

[BLACKLIST]
blacklist_file = /opt/ac-formula/blacklist.txt
