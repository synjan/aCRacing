[STRACKER_CONFIG]
# stracker konfig – MX-5 Cup
# Plasser i /opt/stracker/mx5cup/stracker.ini

[STRACKER]
ac_server_cfg_ini = /opt/ac-mx5cup/cfg/server_cfg.ini
listening_port = 50042
perform_checksum_check = False

database_file = /opt/stracker/mx5cup/stracker.db3
database_type = sqlite3

log_file = /opt/stracker/mx5cup/stracker.log
log_level = info

[HTTP_CONFIG]
enabled = True
port = 50042
bind_address = 127.0.0.1
ssl = False

banner = MX-5 Cup 2026 Stats
item_count = 25

[LAPSTATS_CONFIG]
ignore_pits = True
min_num_laps_in_stats = 1
max_lap_invalid_cut = 2

valid_only = True

[WELCOME_MSG]
line1 = Velkommen til MX-5 Cup 2026!
line2 = Bil: Mazda MX-5 Cup | Banen roterer daglig kl. 06:00
line3 = Statistikk: stats.dittdomene.no/mx5cup

[BLACKLIST]
blacklist_file = /opt/ac-mx5cup/blacklist.txt
