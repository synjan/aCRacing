[STRACKER_CONFIG]
# stracker konfig – Roadcar Serie
# Plasser i /opt/stracker/roadcar/stracker.ini

[STRACKER]
ac_server_cfg_ini = /opt/ac-roadcar/cfg/server_cfg.ini
listening_port = 50043
perform_checksum_check = False

database_file = /opt/stracker/roadcar/stracker.db3
database_type = sqlite3

log_file = /opt/stracker/roadcar/stracker.log
log_level = info

[HTTP_CONFIG]
enabled = True
port = 50043
bind_address = 127.0.0.1
ssl = False

banner = Roadcar Series Stats
item_count = 25

[LAPSTATS_CONFIG]
ignore_pits = True
min_num_laps_in_stats = 1
max_lap_invalid_cut = 2
valid_only = True

[WELCOME_MSG]
line1 = Velkommen til Roadcar Series!
line2 = Kun Kunos originalbiler – ingen mods nødvendig!
line3 = Statistikk: stats.dittdomene.no/roadcar

[BLACKLIST]
blacklist_file = /opt/ac-roadcar/blacklist.txt
