[STRACKER_CONFIG]
# stracker konfig – GT3 Series
# Plasser i /opt/stracker/gt3/stracker.ini

[STRACKER]
ac_server_cfg_ini = /opt/ac-gt3/cfg/server_cfg.ini
listening_port = 50043
perform_checksum_check = False

database_file = /opt/stracker/gt3/stracker.db3
database_type = sqlite3

log_file = /opt/stracker/gt3/stracker.log
log_level = info

[HTTP_CONFIG]
enabled = True
port = 50043
bind_address = 127.0.0.1
ssl = False

banner = GT3 Series 2026 Stats
item_count = 25

[LAPSTATS_CONFIG]
ignore_pits = True
min_num_laps_in_stats = 1
max_lap_invalid_cut = 2
valid_only = True

[WELCOME_MSG]
line1 = Velkommen til GT3 Series 2026!
line2 = 10 GT3-biler | Banen roterer daglig kl. 06:00
line3 = Statistikk: stats.dittdomene.no/gt3

[BLACKLIST]
blacklist_file = /opt/ac-gt3/blacklist.txt
