[STRACKER_CONFIG]
# stracker konfig – Trackday (Nordschleife)
# Plasser i /opt/stracker/trackday/stracker.ini

[STRACKER]
# AC-server tilkobling
ac_server_cfg_ini = /opt/ac-trackday/cfg/server_cfg.ini
listening_port = 50041
perform_checksum_check = False        # Trackday er åpen, ingen checksums

# Database
database_file = /opt/stracker/trackday/stracker.db3
database_type = sqlite3               # Bytt til postgresql for større setup

# Logging
log_file = /opt/stracker/trackday/stracker.log
log_level = info                      # debug / info / warning

[HTTP_CONFIG]
# Webgrensesnitt – nås via stats.dittdomene.no (Caddy proxyer)
enabled = True
port = 50041
bind_address = 127.0.0.1             # Kun lokalt, Caddy håndterer eksternt
ssl = False                           # Caddy tar seg av SSL

# Webui utseende
banner = Nordschleife Touristenfahrten Stats
item_count = 25                       # Antall runder per side

[LAPSTATS_CONFIG]
# Hvilke sesjoner som teller
ignore_pits = True                    # Ikke tell pit-runder
min_num_laps_in_stats = 1
max_lap_invalid_cut = 3              # Maks antall kutt før runde ugyldiggjøres

[WELCOME_MSG]
# Melding til spillere via stracker
line1 = Velkommen til Nordschleife TF!
line2 = Statistikk: stats.dittdomene.no
line3 = Live kart: live.dittdomene.no

[BLACKLIST]
# Sync med AssettoServer sin blacklist
blacklist_file = /opt/ac-trackday/blacklist.txt
