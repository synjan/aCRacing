# ═══════════════════════════════════════════════════════════════
# SYSTEMD SERVICE FILES – Assetto Corsa Servers
# Plasser disse i /etc/systemd/system/
# Aktiver med: systemctl enable ac-trackday ac-mx5cup ac-gt3
# ═══════════════════════════════════════════════════════════════

# ── ac-trackday.service ──────────────────────────────────────
[Unit]
Description=AC Trackday – Nordschleife TF
After=network.target
Wants=network-online.target

[Service]
Type=simple
User=acserver
WorkingDirectory=/opt/ac-trackday
ExecStart=/opt/ac-trackday/AssettoServer
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal
SyslogIdentifier=ac-trackday

# Grenser for å beskytte systemet
MemoryMax=2500M
CPUQuota=80%

[Install]
WantedBy=multi-user.target


# ── ac-mx5cup.service ──────────────────────────────────────
[Unit]
Description=AC MX-5 Cup 2026
After=network.target
Wants=network-online.target

[Service]
Type=simple
User=acserver
WorkingDirectory=/opt/ac-mx5cup
ExecStart=/opt/ac-mx5cup/AssettoServer
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal
SyslogIdentifier=ac-mx5cup

MemoryMax=2000M
CPUQuota=70%

[Install]
WantedBy=multi-user.target


# ── ac-gt3.service ─────────────────────────────────────────
[Unit]
Description=AC GT3 Series 2026
After=network.target
Wants=network-online.target

[Service]
Type=simple
User=acserver
WorkingDirectory=/opt/ac-gt3
ExecStart=/opt/ac-gt3/AssettoServer
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal
SyslogIdentifier=ac-gt3

MemoryMax=2000M
CPUQuota=70%

[Install]
WantedBy=multi-user.target


# ── acracing-web.service ──────────────────────────────────────
[Unit]
Description=aCRacing Web – Express + Steam Auth
After=network.target
Wants=ac-trackday.service ac-mx5cup.service ac-gt3.service

[Service]
Type=simple
User=acserver
WorkingDirectory=/opt/www
ExecStart=/usr/bin/node server.js
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal
SyslogIdentifier=acracing-web

Environment=NODE_ENV=production
Environment=PORT=3001
Environment=BASE_URL=http://46.225.176.106:8080
EnvironmentFile=-/opt/www/.env

MemoryMax=256M
CPUQuota=20%

[Install]
WantedBy=multi-user.target


# ═══════════════════════════════════════════════════════════════
# INSTALLASJONSINSTRUKSJONER
# ═══════════════════════════════════════════════════════════════
#
# 1. Opprett bruker:
#    sudo useradd -r -s /sbin/nologin acserver
#
# 2. Kopier service-filene (separat per fil):
#    sudo cp ac-trackday.service /etc/systemd/system/
#    sudo cp ac-mx5cup.service /etc/systemd/system/
#    sudo cp ac-gt3.service /etc/systemd/system/
#    sudo cp acracing-web.service /etc/systemd/system/
#
# 3. Reload og aktiver:
#    sudo systemctl daemon-reload
#    sudo systemctl enable --now ac-trackday ac-mx5cup ac-gt3 acracing-web
#
# 4. Sjekk status:
#    sudo systemctl status ac-trackday
#    sudo journalctl -u ac-mx5cup -f
#
# 5. Sett opp cron for banerotering:
#    sudo crontab -e
#    Legg til: 0 6 * * * /opt/scripts/rotate_tracks.sh >> /var/log/ac-rotate.log 2>&1
