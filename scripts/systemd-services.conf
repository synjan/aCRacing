# ═══════════════════════════════════════════════════════════════
# SYSTEMD SERVICE FILES – Assetto Corsa Servers
# Plasser disse i /etc/systemd/system/
# Aktiver med: systemctl enable ac-trackday ac-formula ac-roadcar
# ═══════════════════════════════════════════════════════════════

# ── ac-trackday.service ──────────────────────────────────────
[Unit]
Description=AC Trackday – Nordschleife TF
After=network.target
Wants=network-online.target

[Service]
Type=simple
User=acserver
WorkingDirectory=/opt/ac-trackday
ExecStart=/opt/ac-trackday/AssettoServer
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal
SyslogIdentifier=ac-trackday

# Grenser for å beskytte systemet
MemoryMax=2500M
CPUQuota=80%

[Install]
WantedBy=multi-user.target


# ── ac-formula.service ────────────────────────────────────────
[Unit]
Description=AC Formula Serie 2026
After=network.target
Wants=network-online.target

[Service]
Type=simple
User=acserver
WorkingDirectory=/opt/ac-formula
ExecStart=/opt/ac-formula/AssettoServer
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal
SyslogIdentifier=ac-formula

MemoryMax=2000M
CPUQuota=70%

[Install]
WantedBy=multi-user.target


# ── ac-roadcar.service ───────────────────────────────────────
[Unit]
Description=AC Roadcar Serie
After=network.target
Wants=network-online.target

[Service]
Type=simple
User=acserver
WorkingDirectory=/opt/ac-roadcar
ExecStart=/opt/ac-roadcar/AssettoServer
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal
SyslogIdentifier=ac-roadcar

MemoryMax=2000M
CPUQuota=70%

[Install]
WantedBy=multi-user.target


# ═══════════════════════════════════════════════════════════════
# INSTALLASJONSINSTRUKSJONER
# ═══════════════════════════════════════════════════════════════
#
# 1. Opprett bruker:
#    sudo useradd -r -s /sbin/nologin acserver
#
# 2. Kopier service-filene (separat per fil):
#    sudo cp ac-trackday.service /etc/systemd/system/
#    sudo cp ac-formula.service /etc/systemd/system/
#    sudo cp ac-roadcar.service /etc/systemd/system/
#
# 3. Reload og aktiver:
#    sudo systemctl daemon-reload
#    sudo systemctl enable --now ac-trackday ac-formula ac-roadcar
#
# 4. Sjekk status:
#    sudo systemctl status ac-trackday
#    sudo journalctl -u ac-formula -f
#
# 5. Sett opp cron for banerotering:
#    sudo crontab -e
#    Legg til: 0 6 * * * /opt/scripts/rotate_tracks.sh >> /var/log/ac-rotate.log 2>&1
