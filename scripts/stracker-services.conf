# ═══════════════════════════════════════════════════════════════
# SYSTEMD SERVICE FILES – stracker (3 instanser)
# ═══════════════════════════════════════════════════════════════

# ── stracker-trackday.service ────────────────────────────────
[Unit]
Description=stracker – Trackday (Nordschleife)
After=ac-trackday.service
Requires=ac-trackday.service

[Service]
Type=simple
User=acserver
WorkingDirectory=/opt/stracker/trackday
ExecStart=/usr/bin/python3 /opt/stracker/stracker.py --config /opt/stracker/trackday/stracker.ini
Restart=always
RestartSec=5
SyslogIdentifier=stracker-trackday

[Install]
WantedBy=multi-user.target


