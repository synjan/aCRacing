# AssettoServer - Trackday (Nordschleife Touristenfahrten) Extra Config

# -- Topp-niva flagg --
EnableAi: true
EnableWeatherFx: true
EnableClientMessages: true
EnableUdpClientMessages: true
EnableCustomUpdate: true

# -- Plugins --
EnablePlugins:
  - AutoModerationPlugin
  - RandomWeatherPlugin

# -- AI trafikk --
# Nordschleife turistkjoring - realistisk blandet trafikk
AiParams:
  MaxAiTargetCount: 24
  AiPerPlayerTargetCount: 12
  HideAiCars: true
  NamePrefix: Traffic
  MaxSpeedKph: 110
  RightLaneOffsetKph: 15
  MaxSpeedVariationPercent: 0.15
  CorneringSpeedFactor: 0.65
  MinAiSafetyDistanceMeters: 25
  MaxAiSafetyDistanceMeters: 90
  TwoWayTraffic: false
  WrongWayTraffic: false
  EnableDaytimeLights: true
  IgnoreObstaclesAfterSeconds: 15
  PlayerRadiusMeters: 300
  PlayerPositionOffsetMeters: 200
  MaxSpawnDistancePoints: 600
  SpawnSafetyDistanceToPlayerMeters: 200
  StateSpawnDistanceMeters: 1500
  MinStateDistanceMeters: 300
  # Daglig trafikksyklus: stille natt, travel dag, rolig kveld
  # Krever TIME_OF_DAY_MULT > 0 i server_cfg.ini
  HourlyTrafficDensity:
    - 0.3   # 00:00
    - 0.25  # 01:00
    - 0.2   # 02:00
    - 0.2   # 03:00
    - 0.2   # 04:00
    - 0.3   # 05:00
    - 0.4   # 06:00
    - 0.55  # 07:00
    - 0.7   # 08:00
    - 0.85  # 09:00
    - 1.0   # 10:00 - rushet
    - 0.9   # 11:00
    - 0.8   # 12:00
    - 0.85  # 13:00
    - 1.0   # 14:00 - ettermiddagsrush
    - 0.9   # 15:00
    - 0.8   # 16:00
    - 0.65  # 17:00
    - 0.5   # 18:00
    - 0.4   # 19:00
    - 0.35  # 20:00
    - 0.3   # 21:00
    - 0.3   # 22:00
    - 0.3   # 23:00
  # Per-bil hastighet: fra treg turist til rask lokalkjent (18 modeller)
  CarSpecificOverrides:
    - Model: abarth500
      CorneringSpeedFactor: 0.42
      Acceleration: 1.5
      Deceleration: 6.0
    - Model: ks_abarth_595ss
      CorneringSpeedFactor: 0.48
      Acceleration: 1.7
      Deceleration: 6.5
    - Model: alfa_romeo_giulietta_qv
      CorneringSpeedFactor: 0.53
      Acceleration: 2.0
