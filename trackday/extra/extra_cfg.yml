# -- Dynamisk vaer --
# Nordschleife-vaer: varierende, med taake og regn som overrasker
# Vekter: 0=aldri, 1=normal, 2=dobbelt sjanse
--- !RandomWeatherConfiguration
WeatherWeights:
  Clear: 2.0
  FewClouds: 2.0
  ScatteredClouds: 1.5
  BrokenClouds: 1.0
  OvercastClouds: 0.8
  Mist: 1.0
  Fog: 1.2
  LightDrizzle: 0.8
  LightRain: 0.7
  Rain: 0.4
  HeavyRain: 0.2
  LightThunderstorm: 0.1
  Thunderstorm: 0.0
  HeavyThunderstorm: 0.0
  Hurricane: 0.0
  Tornado: 0.0
  Hail: 0.0
  Snow: 0.0
  LightSnow: 0.0
  HeavySnow: 0.0
MinWeatherDurationMinutes: 10
MaxWeatherDurationMinutes: 30
MinTransitionDurationSeconds: 120
MaxTransitionDurationSeconds: 360
