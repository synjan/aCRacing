<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024, height=600">
<title>aCRacing — Server Launcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 600px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0f; }

  .container {
    display: flex; gap: 20px; padding: 20px;
    width: 100%; height: 100%;
  }

  .server-btn {
    flex: 1; position: relative; border-radius: 16px; overflow: hidden;
    cursor: pointer; border: 2px solid rgba(255,255,255,0.08);
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .server-btn:hover {
    transform: scale(1.02);
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 0 30px rgba(100,140,255,0.15);
  }
  .server-btn:active { transform: scale(0.98); }

  .server-btn .bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    filter: brightness(0.7) saturate(1.1);
    transition: filter 0.15s;
  }
  .server-btn:hover .bg { filter: brightness(0.85) saturate(1.2); }

  .server-btn .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.1) 100%);
  }

  .server-btn .content {
    position: relative; z-index: 1; padding: 24px;
  }

  .server-btn .name {
    font-size: 26px; font-weight: 700; color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    margin-bottom: 6px;
  }

  .server-btn .desc {
    font-size: 14px; color: rgba(255,255,255,0.65);
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    margin-bottom: 14px;
  }

  .server-btn .join-label {
    display: inline-block; padding: 8px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; color: #fff;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    transition: background 0.15s;
  }
  .server-btn:hover .join-label {
    background: rgba(100,160,255,0.3);
    border-color: rgba(100,160,255,0.5);
  }

  /* Server-specific accent colors */
  .server-btn.trackday { border-bottom: 3px solid #4caf50; }
  .server-btn.mx5cup   { border-bottom: 3px solid #ff9800; }
  .server-btn.gt3      { border-bottom: 3px solid #2196f3; }

  .server-btn.trackday:hover .join-label { background: rgba(76,175,80,0.35); border-color: rgba(76,175,80,0.6); }
  .server-btn.mx5cup:hover .join-label   { background: rgba(255,152,0,0.35); border-color: rgba(255,152,0,0.6); }
  .server-btn.gt3:hover .join-label      { background: rgba(33,150,243,0.35); border-color: rgba(33,150,243,0.6); }

  .header {
    position: absolute; top: 16px; left: 0; right: 0;
    text-align: center; z-index: 10; pointer-events: none;
  }
  .header .logo { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; }
</style>
</head>
<body>

<div class="header"><span class="logo">aCRacing</span></div>

<div class="container">
  <!-- Trackday — Nordschleife -->
  <div class="server-btn trackday" onclick="join(9680)">
    <div class="bg" style="background-image: url('img/trackday.png')"></div>
    <div class="overlay"></div>
    <div class="content">
      <div class="name">Trackday</div>
      <div class="desc">Nordschleife Touristenfahrten</div>
      <div class="join-label">Koble til</div>
    </div>
  </div>

  <!-- MX-5 Cup -->
  <div class="server-btn mx5cup" onclick="join(9690)">
    <div class="bg" style="background-image: url('img/mx5cup.png')"></div>
    <div class="overlay"></div>
    <div class="content">
      <div class="name">MX-5 Cup</div>
      <div class="desc">Mazda MX-5 Cup 2026</div>
      <div class="join-label">Koble til</div>
    </div>
  </div>

  <!-- GT3 Series -->
  <div class="server-btn gt3" onclick="join(9700)">
    <div class="bg" style="background-image: url('img/gt3.png')"></div>
    <div class="overlay"></div>
    <div class="content">
      <div class="name">GT3 Series</div>
      <div class="desc">10 GT3-biler &mdash; daglig banerotasjon</div>
      <div class="join-label">Koble til</div>
    </div>
  </div>
</div>

<script>
  const SERVER_IP = "46.225.176.106";

  function join(httpPort) {
    window.location.href = `acmanager://race/online/join?ip=${SERVER_IP}&httpPort=${httpPort}`;
  }
</script>

</body>
</html>
